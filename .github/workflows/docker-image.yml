name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Image Build no push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: |
            bilibili-fetcher:${{ github.sha }}
            bilibili-fetcher:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true  